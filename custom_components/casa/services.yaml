remove_token:
  name: "Remove Casa Token"
  description: "Forcefully logs out a session by removing its refresh token."
  fields:
    username:
      name: "Username"
      description: "The user account this token belongs to."
      required: true
      selector:
        text: {}
    token_id:
      name: "Token ID"
      description: "The exact ID of the token to remove, or an asterisk (*) to remove ALL tokens for this user."
      required: true
      selector:
        text: {}

create_user:
  name: "Create Casa User"
  description: "Creates a new Home Assistant local user account with standard permissions."
  fields:
    name:
      name: "Display Name"
      description: "e.g., Guest 1. The full name shown in the HA UI."
      required: true
      selector:
        text: {}
    username:
      name: "Username"
      description: "e.g., guest_1. The login username."
      required: true
      selector:
        text: {}
    password:
      name: "Password (Optional)"
      description: "If left blank, a secure 12-character password will be randomly generated and returned to your automation."
      selector:
        text: {}
    local_only:
      name: "Local Access Only"
      description: "If enabled, this user can ONLY connect while on your local WiFi network. External remote access is blocked by Home Assistant."
      default: true
      selector:
        boolean: {}

list_tokens:
  name: "List Casa Tokens"
  description: "Returns a list of all active login tokens and devices connected to a specific user."
  fields:
    username:
      name: "Username"
      description: "The user account to check (e.g., guest)."
      required: true
      selector:
        text: {}

housekeeping:
  name: "Casa Housekeeping"
  description: "Sweeps the www folder and deletes old QR code images."
  fields:
    hours_old:
      name: "Hours Old"
      description: "Delete files that were created more than this many hours ago."
      required: true
      default: 24
      selector:
        number:
          min: 1
          max: 720
          mode: box
    prefix:
      name: "File Prefix"
      description: "The prefix of the files to target (e.g., qr_)."
      required: true
      default: "qr_"
      selector:
        text: {}

scramble_guest_password:
  name: "Scramble User Password"
  description: "Manually scrambles a user's password and optionally forces a logout across all devices."
  fields:
    username:
      name: "Username"
      description: "The user account to scramble (e.g., guest_1)."
      required: true
      selector:
        text: {}
    deauthenticate:
      name: "Deauthenticate Devices"
      description: "If enabled, all active tokens for this user will be deleted, forcing their devices offline immediately."
      default: true
      selector:
        boolean: {}

