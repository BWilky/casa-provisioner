clear_ble_beacon:
  name: "Clear BLE Beacon"
  description: "Forcefully stops specific ESPHome beacons from broadcasting a provisioning profile."
  fields:
    esphome_service:
      name: "ESPHome Target Services"
      description: "Add ESPHome API services one by one (e.g., esphome.lobby_beacon_update_payload)."
      required: true
      selector:
        text:
          multiple: true

remove_user:
  name: "Remove Casa User"
  description: "Deletes a local user account from Home Assistant and updates the Casa user tracker."
  fields:
    username:
      name: "Username"
      description: "The username of the user account to remove."
      required: true
      selector:
        text: {}

view_casa_users:
  name: "View Casa Users"
  description: "Lists users created via the integration, including optional deleted records."
  fields:
    include_deleted:
      name: "Include Deleted Users"
      description: "Whether to include users that have been deleted."
      default: false
      selector:
        boolean: {}