clear_ble_beacon:
  name: "Clear BLE Beacon"
  description: "Forcefully stops specific ESPHome beacons from broadcasting a provisioning profile."
  fields:
    esphome_service:
      name: "ESPHome Target Services"
      description: "Add ESPHome API services one by one (e.g., esphome.lobby_beacon_update_payload)."
      required: true
      selector:
        text:
          multiple: true

remove_user:
  name: "Remove Casa User"
  description: "Deletes a local user account from Home Assistant and updates the Casa user tracker."
  fields:
    username:
      name: "Username"
      description: "The username of the user account to remove."
      required: true
      selector:
        text: {}

view_casa_users:
  name: "View Casa Users"
  description: "Lists users created via the integration, including optional deleted records."
  fields:
    include_deleted:
      name: "Include Deleted Users"
      description: "Whether to include users that have been deleted."
      default: false
      selector:
        boolean: {}

register_device:
  name: "Register Casa Device"
  description: "Registers a device token for push notifications for the caller user context."
  fields:
    device_id:
      name: "Device ID"
      description: "A unique identifier for the device."
      required: true
      selector:
        text: {}
    push_token:
      name: "Push Token"
      description: "The APNs device token (hex)."
      required: true
      selector:
        text: {}

notify_user:
  name: "Notify Casa User"
  description: "Sends a push notification to all registered devices of a guest user via the Google Cloud relay."
  fields:
    username:
      name: "Username"
      description: "The guest user username to notify."
      required: true
      selector:
        text: {}
    title:
      name: "Title"
      description: "The title of the push notification."
      required: true
      selector:
        text: {}
    message:
      name: "Message"
      description: "The message content of the push notification."
      required: true
      selector:
        text: {}
    data:
      name: "Data"
      description: "Additional custom dictionary/JSON data to send with the push notification."
      required: false
      selector:
        object: {}

reconcile:
  name: "Reconcile Relay Registrations"
  description: "Diffs the relay's live proxy tokens against HA's device records. Unregisters orphaned tokens from the relay and flags devices whose registration the relay lost so they re-register on next heartbeat. Runs automatically once a day."

reload_device:
  name: "Reload Casa Device"
  description: "Sends a silent background push notification to clear cache and reload the default URL on a registered device."
  fields:
    device_id:
      name: "Device ID"
      description: "The unique identifier (UUID) of the target device to reload."
      required: true
      selector:
        text: {}

update_wireguard:
  name: "Update WireGuard Configuration"
  description: "Pushes a new WireGuard configuration (or revokes the existing one) to a provisioned device over push notification. The config is end-to-end encrypted so the push relay can never read it."
  fields:
    device_id:
      name: "Device ID"
      description: "Target a single device by its unique identifier (UUID). Provide this OR a username."
      required: false
      selector:
        text: {}
    username:
      name: "Username"
      description: "Target all registered devices of this user. Provide this OR a device_id."
      required: false
      selector:
        text: {}
    action:
      name: "Action"
      description: "Push a new configuration ('update') or remove the existing one from the device ('revoke')."
      default: "update"
      selector:
        select:
          options:
            - label: "Update Configuration"
              value: "update"
            - label: "Revoke Configuration"
              value: "revoke"
    wireguard_config:
      name: "WireGuard Configuration"
      description: "The client's WireGuard configuration file content. Required when Action is 'update'."
      required: false
      selector:
        text:
          multiline: true
    wireguard_excluded_wifi:
      name: "WireGuard Excluded Wi-Fi Networks"
      description: "Comma-separated list of Wi-Fi SSIDs where WireGuard should not activate (e.g., home networks)."
      required: false
      selector:
        text: {}
    encrypt_config:
      name: "Encrypt Configuration"
      description: "End-to-end encrypt the WireGuard config so the push relay cannot read or tamper with it. The key is derived from the device's existing session secret (never sent to the relay) and the app decrypts it locally. Leave enabled unless you are debugging and explicitly need a plaintext payload."
      default: true
      selector:
        boolean: {}
    silent:
      name: "Silent"
      description: "Deliver as a silent background push that applies the change without alerting the user. Disable to also show a notification."
      default: true
      selector:
        boolean: {}
    title:
      name: "Notification Title"
      description: "Title shown to the user. Only used when Silent is disabled."
      required: false
      selector:
        text: {}
    message:
      name: "Notification Message"
      description: "Message shown to the user. Only used when Silent is disabled."
      required: false
      selector:
        text: {}